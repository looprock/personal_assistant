{# Tag/label cloud pill buttons — rendered into #tag-cloud by tag_cloud/htmx #}
<button
  hx-get="/todos/filter/htmx"
  hx-target="#todos-content"
  hx-swap="innerHTML"
  onclick="setActiveTag(this)"
  class="tag-pill active text-xs px-2.5 py-1 rounded-full border bg-blue-100 text-blue-700 border-blue-300 transition-colors">
  All
</button>
<button
  hx-get="/todos/filter/htmx?tag=__active__"
  hx-target="#todos-content"
  hx-swap="innerHTML"
  onclick="setActiveTag(this)"
  class="tag-pill text-xs px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors flex items-center gap-1">
  Active
  {% if active_count %}
  <span class="bg-gray-400 text-white text-[10px] px-1.5 py-0.5 rounded-full font-semibold">{{ active_count }}</span>
  {% endif %}
</button>
<button
  hx-get="/todos/filter/htmx?tag=__untagged__"
  hx-target="#todos-content"
  hx-swap="innerHTML"
  onclick="setActiveTag(this)"
  class="tag-pill text-xs px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">
  Untagged
</button>
{% for tag in all_tags %}
<button
  hx-get="/todos/filter/htmx?tag={{ tag | urlencode }}"
  hx-target="#todos-content"
  hx-swap="innerHTML"
  onclick="setActiveTag(this)"
  class="tag-pill text-xs px-2.5 py-1 rounded-full border border-gray-200 text-gray-500 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-colors">
  tag:{{ tag }}
</button>
{% endfor %}
{% for label in all_labels %}
<button
  hx-get="/todos/filter/htmx?label={{ label | urlencode }}"
  hx-target="#todos-content"
  hx-swap="innerHTML"
  onclick="setActiveTag(this)"
  class="tag-pill text-xs px-2.5 py-1 rounded-full border border-blue-200 text-blue-500 hover:bg-blue-100 hover:text-blue-700 hover:border-blue-300 transition-colors">
  label:{{ label }}
</button>
{% endfor %}
