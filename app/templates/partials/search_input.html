{# Reusable search input — set hx_target and hx_url before including #}
<div class="bg-white rounded-2xl px-4 py-3 shadow-sm">
  <input
    type="search"
    name="q"
    placeholder="Search…"
    autocomplete="off"
    hx-get="{{ search_url }}"
    hx-trigger="input changed delay:300ms, search"
    hx-target="{{ search_target }}"
    hx-swap="innerHTML"
    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
</div>
